function adj(hex,a){var r=parseInt(hex.slice(1,3),16)+a,g=parseInt(hex.slice(3,5),16)+a,b=parseInt(hex.slice(5,7),16)+a;return'#'+[r,g,b].map(c=>Math.max(0,Math.min(255,c)).toString(16).padStart(2,'0')).join('')}
function hBack(s){var h=s.hair;switch(s.hairStyle){case'long-straight':return'<path d="M48,70 Q48,40 100,30 Q152,40 152,70 L155,155 Q155,165 145,165 L140,100 Q140,65 100,55 Q60,65 60,100 L55,165 Q45,165 45,155 Z" fill="'+h+'"/>';case'long-wavy':return'<path d="M48,70 Q48,40 100,30 Q152,40 152,70 L155,140 Q160,155 150,165 Q145,150 148,135 L148,100 Q140,65 100,55 Q60,65 52,100 L52,135 Q55,150 50,165 Q40,155 45,140 Z" fill="'+h+'"/>';case'medium-wave':return'<path d="M50,70 Q50,40 100,32 Q150,40 150,70 L148,120 Q145,135 140,130 L142,100 Q138,60 100,50 Q62,60 58,100 L60,130 Q55,135 52,120 Z" fill="'+h+'"/>';case'soft-wave':return'<path d="M48,70 Q48,38 100,28 Q152,38 152,70 L150,130 Q148,140 142,135 L140,100 Q138,60 100,50 Q62,60 60,100 L58,135 Q52,140 50,130 Z" fill="'+h+'"/>';case'ponytail':return'<path d="M50,65 Q50,38 100,28 Q150,38 150,65 L148,95 Q145,60 100,50 Q55,60 52,95 Z" fill="'+h+'"/><ellipse cx="135" cy="45" rx="15" ry="20" fill="'+h+'" transform="rotate(25,135,45)"/>';default:return''}}

function eyes(s){var l='<line x1="68" y1="88" x2="65" y2="85" stroke="#3D2C4E" stroke-width="1.2" stroke-linecap="round"/><line x1="72" y1="86" x2="70" y2="82" stroke="#3D2C4E" stroke-width="1.2" stroke-linecap="round"/><line x1="128" y1="86" x2="130" y2="82" stroke="#3D2C4E" stroke-width="1.2" stroke-linecap="round"/><line x1="132" y1="88" x2="135" y2="85" stroke="#3D2C4E" stroke-width="1.2" stroke-linecap="round"/>';switch(s.eyes){case'spark':return l+'<ellipse cx="78" cy="92" rx="6" ry="7" fill="#3D2C4E"/><ellipse cx="122" cy="92" rx="6" ry="7" fill="#3D2C4E"/><circle cx="80" cy="89" r="2.5" fill="#fff"/><circle cx="124" cy="89" r="2.5" fill="#fff"/>';case'wink':return l+'<ellipse cx="78" cy="92" rx="6" ry="7" fill="#3D2C4E"/><circle cx="80" cy="89" r="2.5" fill="#fff"/><path d="M116,92 Q122,86 128,92" fill="none" stroke="#3D2C4E" stroke-width="2.5" stroke-linecap="round"/>';case'heart':return l+'<path d="M73,88 Q73,82 78,82 Q83,82 83,88 Q83,94 78,98 Q73,94 73,88Z" fill="#E91E63"/><path d="M117,88 Q117,82 122,82 Q127,82 127,88 Q127,94 122,98 Q117,94 117,88Z" fill="#E91E63"/>';case'gentle':return l+'<ellipse cx="78" cy="93" rx="5.5" ry="6.5" fill="#3D2C4E"/><ellipse cx="122" cy="93" rx="5.5" ry="6.5" fill="#3D2C4E"/><circle cx="80" cy="90" r="2" fill="#fff"/><circle cx="124" cy="90" r="2" fill="#fff"/><path d="M72,84 Q78,80 84,84" fill="none" stroke="#3D2C4E" stroke-width="1.2"/><path d="M116,84 Q122,80 128,84" fill="none" stroke="#3D2C4E" stroke-width="1.2"/>';case'smart':return l+'<rect x="72" y="86" width="16" height="11" rx="5" fill="none" stroke="#3D2C4E" stroke-width="1.5"/><rect x="112" y="86" width="16" height="11" rx="5" fill="none" stroke="#3D2C4E" stroke-width="1.5"/><line x1="88" y1="91" x2="112" y2="91" stroke="#3D2C4E" stroke-width="1"/><circle cx="80" cy="91" r="3.5" fill="#3D2C4E"/><circle cx="120" cy="91" r="3.5" fill="#3D2C4E"/>';case'determined':return l+'<ellipse cx="78" cy="93" rx="5.5" ry="6" fill="#3D2C4E"/><ellipse cx="122" cy="93" rx="5.5" function mouth(s){var lp='<ellipse cx="100" cy="118" rx="8" ry="3.5" fill="#FFAB91" opacity=".25"/>';switch(s.mouth){case'big-smile':return lp+'<path d="M82,115 Q100,130 118,115" fill="none" stroke="#3D2C4E" stroke-width="2.5" stroke-linecap="round"/>';case'smile':return lp+'<path d="M86,115 Q100,124 114,115" fill="none" stroke="#3D2C4E" stroke-width="2" stroke-linecap="round"/>';case'calm-smile':return lp+'<path d="M88,116 Q100,122 112,116" fill="none" stroke="#3D2C4E" stroke-width="2" stroke-linecap="round"/>';case'smirk':return lp+'<path d="M88,116 Q100,120 115,113" fill="none" stroke="#3D2C4E" stroke-width="2" stroke-linecap="round"/>';case'neutral':return lp+'<line x1="88" y1="116" x2="112" y2="116" stroke="#3D2C4E" stroke-width="2" stroke-linecap="round"/>';default:return lp+'<path d="M88,115 Q100,123 112,115" fill="none" stroke="#3D2C4E" stroke-width="2" stroke-linecap="round"/>'}}
function acc(s){switch(s.accessory){case'star':return'<polygon points="160,30 163,38 172,38 165,43 167,52 160,47 153,52 155,43 148,38 157,38" fill="#FFD54F"/>';case'butterfly':return'<path d="M160,35 Q170,25 175,35 Q170,40 160,35Z" fill="#CE93D8" opacity=".8"/><path d="M160,35 Q150,25 145,35 Q150,40 160,35Z" fill="#CE93D8" opacity=".8"/>';case'sun':return'<circle cx="162" cy="32" r="8" fill="#FFD54F"/><g stroke="#FFD54F" stroke-width="2"><line x1="162" y1="18" x2="162" y2="22"/><line x1="162" y1="42" x2="162" y2="46"/><line x1="148" y1="32" x2="152" y2="32"/><line x1="172" y1="32" x2="176" y2="32"/></g>';case'castle':return'<rect x="150" y="25" width="20" height="20" fill="#B39DDB" rx="2"/><rect x="152" y="18" width="4" height="10" fill="#B39DDB"/><rect x="164" y="18" width="4" height="10" fill="#B39DDB"/><rect x="157" y="30" width="6" height="15" rx="3" fill="#9575CD"/>';case'leaf':return'<path d="M162,22 Q175,30 168,45 Q160,38 162,22Z" fill="#66BB6A"/><line x1="162" y1="22" x2="166" y2="40" stroke="#43A047" stroke-width="1"/>';case'ruler':return'<rect x="155" y="20" width="6" height="30" fill="#90CAF9" rx="1"/>';case'bear':return'<circle cx="160" cy="30" r="12" fill="#BCAAA4"/><circle cx="152" cy="22" r="5" fill="#BCAAA4"/><circle cx="168" cy="22" r="5" fill="#BCAAA4"/><circle cx="156" cy="28" r="2" fill="#3D2C4E"/><circle cx="164" cy="28" r="2" fill="#3D2C4E"/><ellipse cx="160" cy="33" rx="3" ry="2" fill="#8D6E63"/>';case'house':return'<path d="M150,38 L162,22 L174,38Z" fill="#A1887F"/><rect x="152" y="38" width="20" height="14" fill="#8D6E63"/><rect x="159" y="40" width="6" height="12" fill="#FFCC80"/>';case'rose':return'<circle cx="162" cy="30" r="8" fill="#EF5350"/><circle cx="158" cy="26" r="5" fill="#E53935" opacity=".7"/><line x1="162" y1="38" x2="162" y2="52" stroke="#4CAF50" stroke-width="2"/>';case'moon':return'<path d="M155,20 Q165,20 170,30 Q175,40 165,48 Q170,38 168,28 Q166,22 155,20Z" fill="#7E57C2"/>';case'shield':return'<path d="M155,22 L162,18 L169,22 L169,35 Q162,42 155,35Z" fill="#7986CB" stroke="#3F51B5" stroke-width="1.5"/>';case'diamond':return'<polygon points="162,18 170,30 162,42 154,30" fill="#4DB6AC" stroke="#00897B" stroke-width="1"/>';case'tea':return'<ellipse cx="162" cy="35" rx="10" ry="8" fill="#AED581" stroke="#8BC34A" stroke-width="1.5"/><path d="M172,32 Q178,28 176,38 Q174,42 172,38" fill="none" stroke="#8BC34A" stroke-width="1.5"/>';case'book':return'<rect x="152" y="22" width="18" height="24" fill="#607D8B" rx="2"/><rect x="154" y="24" width="14" height="20" fill="#ECEFF1" rx="1"/><line x1="161" y1="22" x2="161" y2="46" stroke="#455A64" stroke-width="1.5"/>';case'cloud':return'<ellipse cx="162" cy="32" rx="14" ry="8" fill="#E1BEE7" opacity=".7"/><ellipse cx="155" cy="30" rx="8" ry="6" fill="#CE93D8" opacity=".5"/><ellipse cx="170" cy="30" rx="8" ry="6" fill="#CE93D8" opacity=".5"/>';case'dove':return'<path d="M155,30 Q162,20 170,28 Q168,32 162,30 Q160,36 155,30Z" fill="#B0BEC5"/><circle cx="166" cy="26" r="1.5" fill="#455A64"/>';default:return''}}
function svg(c){var s=CS[c];if(!s)return'';var v='<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="sg'+c+'" cx="50%" cy="40%"><stop offset="0%" stop-color="'+s.skin+'"/><stop offset="100%" stop-color="'+adj(s.skin,-20)+'"/></radialGradient></defs>';v+='<circle cx="100" cy="100" r="98" fill="'+s.bg+'"/>';v+=hBack(s);v+='<ellipse cx="100" cy="195" rx="55" ry="35" fill="'+s.top+'"/>';v+='<rect x="88" y="138" width="24" height="18" rx="6" fill="url(#sg'+c+')"/>';v+='<ellipse cx="100" cy="95" rx="52" ry="56" fill="url(#sg'+c+')"/>';v+='<ellipse cx="68" cy="108" rx="12" ry="8" fill="#FFAB91" opacity=".35"/><ellipse cx="132" cy="108" rx="12" ry="8" fill="#FFAB91" opacity=".35"/>';v+=hFront(s);v+=eyes(s);v+=mouth(s);v+=acc(s);v+='</svg>';return v}

// ============================
// RENDER AXES
// ============================
(function(){
  var wrap=document.getElementById('axisRows');
  AXES.forEach(ax=>{
    wrap.innerHTML+=`<div class="axis-row">
      <div class="axis-letter" style="background:${ax.color}">${ax.letter}</div>
      <div class="axis-body">
        <div class="axis-name">${ax.icon} ${ax.name}　<span style="font-weight:400;color:var(--sub);font-size:.72rem">${ax.question}</span></div>
        <div class="axis-spectrum">
          <span class="tag-l">${ax.tagL}（${ax.codeL}）</span>
          <div class="axis-bar" style="background:linear-gradient(90deg,${ax.color},#f5e6f0 50%,${ax.colorR})"></div>
          <span class="tag-r">${ax.tagR}（${ax.codeR}）</span>
        </div>
      </div>
    </div>`;
  });
})();

// ============================
// RENDER TYPE GRID (grouped)
// ============================
const CATS=[
  {key:'op',label:'気持ちを伝える × ときめき重視',sub:'O + P',color:'#FF8A9E',codes:['OPFD','OPFL','OPTD','OPTL']},
  {key:'os',label:'気持ちを伝える × 安定重視',sub:'O + S',color:'#A8E6CF',codes:['OSFD','OSFL','OSTD','OSTL']},
  {key:'rp',label:'控えめ × ときめき重視',sub:'R + P',color:'#CE93D8',codes:['RPFD','RPFL','RPTD','RPTL']},
  {key:'rs',label:'控えめ × 安定重視',sub:'R + S',color:'#90A4AE',codes:['RSFD','RSFL','RSTD','RSTL']}
];

(function(){
  var grid=document.getElementById('typeGrid');
  CATS.forEach(cat=>{
    grid.innerHTML+=`<div class="cat-header">
      <div class="cat-dot" style="background:${cat.color}"></div>
      <span class="cat-label">${cat.label}</span>
      <span class="cat-sub">${cat.sub}</span>
    </div>`;
    cat.codes.forEach(code=>{
      var t=TYPES[code];
      grid.innerHTML+=`<div class="tc" data-cat="${cat.key}" onclick="showDetail('${code}')">
        <div class="tc-chara">${svg(code)}</div>
        <div class="tc-code">${code}</div>
        <div class="tc-name">${t.name}</div>
        <div class="tc-keyword">${t.keyword}</div>
      </div>`;
    });
  });
})();

// ============================
// MODAL
// ============================
function showDetail(code){
  var t=TYPES[code];
  document.getElementById('modalContent').innerHTML=`
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-top">
      <div class="modal-chara">${svg(code)}</div>
      <div class="modal-code">${code}</div>
      <div class="modal-name">${t.name}</div>
      <div class="modal-copy">${t.copy}</div>
    </div>
    <div class="modal-block"><h4>📝 特徴</h4><p>${t.desc}</p></div>
    <div class="modal-block"><h4>✨ 強み</h4><div class="m-tags">${t.strengths.map(s=>'<span class="m-tag">'+s+'</span>').join('')}</div></div>
    <div class="modal-block">
      <h4>💑 相性</h4>
      <div class="m-compat"><div class="m-compat-label">✨ ベストマッチ</div><div class="m-compat-types">${t.bestMatch.map(c=>TYPES[c]?TYPES[c].name+' ('+c+')':c).join('、')}</div><div class="m-compat-reason">${t.bestReason}</div></div>
      <div class="m-compat"><div class="m-compat-label">🌱 成長できる相手</div><div class="m-compat-types">${t.growMatch.map(c=>TYPES[c]?TYPES[c].name+' ('+c+')':c).join('、')}</div><div class="m-compat-reason">${t.growReason}</div></div>
    </div>
    <div class="modal-cta"><a class="cta cta-sm" href="./aibo-shindan.html">自分のタイプを診断する 💕</a></div>`;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('modalOverlay').classList.remove('active');document.body.style.overflow=''}
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal()});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal()});
</script>
</body>
